apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: log
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: true
        editable: true