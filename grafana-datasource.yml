apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: log
  labels:
    grafana_datasource: "1"
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: log-pipeline
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki                    # Must match ${DS_LOKI} in the dashboard JSON
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: true
        version: 1
        jsonData:
          maxLines: 1000
          timeout: 60