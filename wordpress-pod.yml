# ============================================================
# WordPress — standalone Pod for clean naming.
# DB credentials pulled from Secret, not plain text.
# Images pinned to specific digest-stable tags.
# ============================================================
---
apiVersion: v1
kind: Pod
metadata:
  name: wordpress
  namespace: log
  labels:
    app: wordpress
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/part-of: log-pipeline
spec:
  restartPolicy: Always
  containers:
    - name: mysql
      image: mysql:8.0.41
      env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-db-secret
              key: root-password
        - name: MYSQL_DATABASE
          value: wordpress
        - name: MYSQL_USER
          value: wordpress
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-db-secret
              key: user-password
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      readinessProbe:
        exec:
          command:
            - mysqladmin
            - ping
            - -h
            - localhost
        initialDelaySeconds: 20
        periodSeconds: 10
        failureThreshold: 5
      livenessProbe:
        exec:
          command:
            - mysqladmin
            - ping
            - -h
            - localhost
        initialDelaySeconds: 30
        periodSeconds: 15
        failureThreshold: 3

    - name: wordpress
      image: wordpress:6.7.2-php8.2-apache
      ports:
        - containerPort: 80
      env:
        - name: WORDPRESS_DB_HOST
          value: "127.0.0.1:3306"
        - name: WORDPRESS_DB_USER
          value: wordpress
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-db-secret
              key: user-password
        - name: WORDPRESS_DB_NAME
          value: wordpress
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      readinessProbe:
        httpGet:
          path: /wp-login.php
          port: 80
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 5
      livenessProbe:
        httpGet:
          path: /wp-login.php
          port: 80
        initialDelaySeconds: 60
        periodSeconds: 15
        failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: log
  labels:
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/part-of: log-pipeline
spec:
  selector:
    app: wordpress
  ports:
    - name: http
      port: 80
      targetPort: 80
