---
# ============================================================
# rclone-config — used by rclone-archiver DaemonSet
# Pre-populated from host ~/.config/rclone/rclone.conf
# If the token expires re-run: kubectl create secret generic rclone-config
#   --from-file=rclone.conf=~/.config/rclone/rclone.conf -n log --dry-run=client -o yaml | kubectl apply -f -
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: rclone-config
  namespace: log
  labels:
    app.kubernetes.io/part-of: log-pipeline
type: Opaque
data:
  rclone.conf: 
---
# ============================================================
# Listmonk — PostgreSQL credentials
# postgres-password = "listmonkpwd" (echo -n "listmonkpwd" | base64)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: listmonk-db-secret
  namespace: log
  labels:
    app.kubernetes.io/part-of: log-pipeline
type: Opaque
data:
  postgres-password: bGlzdG1vbmtwd2Q=
---
# ============================================================
# Mattermost — PostgreSQL credentials
# password = "mmuser_password" (echo -n "mmuser_password" | base64)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: mattermost-db-secret
  namespace: log
  labels:
    app.kubernetes.io/part-of: log-pipeline
type: Opaque
data:
  postgres-password: bW11c2VyX3Bhc3N3b3Jk
---
# ============================================================
# WordPress — MySQL credentials
# root-password = "rootpassword"   (echo -n "rootpassword" | base64)
# user-password  = "wordpresspwd" (echo -n "wordpresspwd" | base64)
# ============================================================
apiVersion: v1http://localhost:8000/admin/campaigns/2#content
kind: Secret
metadata:
  name: wordpress-db-secret
  namespace: log
  labels:
    app.kubernetes.io/part-of: log-pipeline
type: Opaque
data:
  root-password: cm9vdHBhc3N3b3Jk
  user-password: d29yZHByZXNzcHdk
