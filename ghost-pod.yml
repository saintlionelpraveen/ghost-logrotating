apiVersion: v1
kind: Pod
metadata:
  name: ghost
  namespace: log
  labels:
    app: ghost
spec:
  containers:
    - name: ghost
      image: ghost:latest          # currently ghost:6.24.0
      ports:
        - containerPort: 2368
      env:
        - name: NODE_ENV
          value: development
        - name: database__client
          value: sqlite3
        - name: database__connection__filename
          value: /var/lib/ghost/content/data/ghost.db
        - name: url
          value: http://localhost:2368
      volumeMounts:
        - name: ghost-data
          mountPath: /var/lib/ghost/content
  volumes:
    - name: ghost-data
      emptyDir: {}