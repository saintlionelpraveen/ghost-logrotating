# ============================================================
# Listmonk — standalone Pod for clean naming.
# DB credentials pulled from Secret.
# Images pinned to specific stable tags.
# ============================================================
---
apiVersion: v1
kind: Pod
metadata:
  name: listmonk
  namespace: log
  labels:
    app: listmonk
    app.kubernetes.io/name: listmonk
    app.kubernetes.io/part-of: log-pipeline
spec:
  restartPolicy: Always
  containers:
    - name: postgres
      image: postgres:14.15
      env:
        - name: POSTGRES_DB
          value: listmonk
        - name: POSTGRES_USER
          value: listmonk
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: listmonk-db-secret
              key: postgres-password
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      readinessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - listmonk
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 10
      livenessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - listmonk
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 3

    - name: listmonk
      image: listmonk/listmonk:v4.1.0
      command: ["sh", "-c", "yes | ./listmonk --install --config '' && exec ./listmonk --config ''"]
      ports:
        - containerPort: 9000
      env:
        - name: LISTMONK_app__address
          value: "0.0.0.0:9000"
        - name: LISTMONK_db__host
          value: "localhost"
        - name: LISTMONK_db__user
          value: listmonk
        - name: LISTMONK_db__password
          valueFrom:
            secretKeyRef:
              name: listmonk-db-secret
              key: postgres-password
        - name: LISTMONK_db__database
          value: listmonk
        - name: LISTMONK_db__port
          value: "5432"
        - name: LISTMONK_db__ssl_mode
          value: disable
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 256Mi
      readinessProbe:
        httpGet:
          path: /health
          port: 9000
        initialDelaySeconds: 20
        periodSeconds: 10
        failureThreshold: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 9000
        initialDelaySeconds: 40
        periodSeconds: 15
        failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: listmonk
  namespace: log
  labels:
    app.kubernetes.io/name: listmonk
    app.kubernetes.io/part-of: log-pipeline
spec:
  selector:
    app: listmonk
  ports:
    - name: http
      port: 9000
      targetPort: 9000
