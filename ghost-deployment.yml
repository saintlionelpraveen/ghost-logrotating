---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ghost-data-pvc
  namespace: log
  labels:
    app.kubernetes.io/name: ghost
    app.kubernetes.io/part-of: log-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  namespace: log
  labels:
    app: ghost
    app.kubernetes.io/name: ghost
    app.kubernetes.io/part-of: log-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost
  strategy:
    type: Recreate   # Required with ReadWriteOnce PVC
  template:
    metadata:
      labels:
        app: ghost
        app.kubernetes.io/name: ghost
    spec:
      containers:
        - name: ghost
          image: ghost:6.24.0
          ports:
            - containerPort: 2368
          env:
            - name: NODE_ENV
              value: production
            - name: database__client
              value: sqlite3
            - name: database__connection__filename
              value: /var/lib/ghost/content/data/ghost.db
            # External URL — used for email links and canonical URLs.
            # Update this to your actual Ghost hostname / NodePort URL.
            - name: url
              value: http://ghost.log.svc.cluster.local
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /ghost/api/v4/admin/site/
              port: 2368
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ghost/api/v4/admin/site/
              port: 2368
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: ghost-data
              mountPath: /var/lib/ghost/content
      volumes:
        - name: ghost-data
          persistentVolumeClaim:
            claimName: ghost-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ghost
  namespace: log
  labels:
    app.kubernetes.io/name: ghost
    app.kubernetes.io/part-of: log-pipeline
spec:
  selector:
    app: ghost
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 2368
