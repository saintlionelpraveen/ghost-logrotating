apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: log
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: ghost-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: ghost
              app: ghost
              namespace: log
              __path__: /var/lib/ghost/content/logs/*.log
---
apiVersion: v1
kind: Pod
metadata:
  name: ghost
  namespace: log
  labels:
    app: ghost
spec:
  containers:
    - name: ghost
      image: ghost:latest
      ports:
        - containerPort: 2368
      env:
        - name: NODE_ENV
          value: development
        - name: database__client
          value: sqlite3
        - name: database__connection__filename
          value: /var/lib/ghost/content/data/ghost.db
        - name: url
          value: http://localhost:2368
        - name: logging__level
          value: info
      volumeMounts:
        - name: ghost-data
          mountPath: /var/lib/ghost/content
    - name: promtail
      image: grafana/promtail:latest
      args:
        - -config.file=/etc/promtail/promtail.yaml
      volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail
        - name: ghost-data
          mountPath: /var/lib/ghost/content
          readOnly: true
    - name: logrotate
      image: rclone/rclone:latest
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            for logfile in $(find /var/lib/ghost/content/logs -type f -name "*.log" -size +10240k); do
              ARCHIVE="/var/lib/ghost/content/logs/archive.tar.gz"
              if [ -f "${logfile}.3" ]; then
                mkdir -p /tmp/arch
                [ -f "$ARCHIVE" ] && tar -xzf "$ARCHIVE" -C /tmp/arch 2>/dev/null
                mv "${logfile}.3" "/tmp/arch/$(basename ${logfile}).$(date +%s)"
                tar -czf "${ARCHIVE}.tmp" -C /tmp/arch . 2>/dev/null
                mv "${ARCHIVE}.tmp" "$ARCHIVE"
                rm -rf /tmp/arch
                
                SIZE=$(wc -c < "$ARCHIVE")
                if [ "$SIZE" -ge 15728640 ]; then
                  echo "Archive exceeded 15MB, uploading to GDrive..."
                  NEW_NAME="archive-$(date +%s).tar.gz"
                  rclone copyto "$ARCHIVE" "gdrive:/ghost-logs/$NEW_NAME" --config /etc/rclone/rclone.conf
                  if [ $? -eq 0 ]; then
                    echo "Upload successful! Removing local archive."
                    rm "$ARCHIVE"
                  else
                    echo "Rclone upload failed."
                  fi
                fi
              fi
              
              # Shift and copy current file
              mv "${logfile}.2" "${logfile}.3" 2>/dev/null || true
              mv "${logfile}.1" "${logfile}.2" 2>/dev/null || true
              cp "$logfile" "${logfile}.1"
              > "$logfile"
            done
            sleep 60
          done
      volumeMounts:
        - name: ghost-data
          mountPath: /var/lib/ghost/content
        - name: rclone-config
          mountPath: /etc/rclone
          readOnly: true
  volumes:
    - name: ghost-data
      emptyDir: {}
    - name: promtail-config
      configMap:
        name: promtail-config
    - name: rclone-config
      secret:
        secretName: rclone-config