---
apiVersion: v1
kind: Namespace
metadata:
  name: log
  labels:
    app.kubernetes.io/part-of: log-pipeline
---
# ============================================================
# LimitRange — default CPU/memory for containers that don't
# specify their own (prevents unbounded resource usage)
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: log-limit-range
  namespace: log
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
---
# ============================================================
# ResourceQuota — hard cap on total namespace resource usage
# Prevents a rogue pod from exhausting the entire node
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: log-resource-quota
  namespace: log
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"